name: Quality Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_ENV: test
  DATABASE_URL: postgres://postgres:password@localhost:5432/outline_test
  REDIS_URL: redis://127.0.0.1:6379
  URL: http://localhost:3000
  NODE_OPTIONS: --max-old-space-size=8192
  SECRET_KEY: F0E5AD933D7F6FD8F4DBB3E038C501C052DC0593C686D21ACB30AE205D2F634B
  UTILS_SECRET: 123456
  SLACK_VERIFICATION_TOKEN: 123456
  SMTP_USERNAME: localhost

jobs:
  test-and-analyze:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14.2
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: outline_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # necesario para que SonarQube calcule el codigo nuevo

      # Reutiliza la action propia del proyecto: habilita Corepack,
      # instala Node 26 y Yarn 4 (Berry), y corre "yarn install --immutable"
      - uses: ./.github/actions/install

      - name: Migrar base de datos de prueba
        run: yarn sequelize db:migrate

      - name: Construir Outline
        run: yarn build

      - name: Levantar Outline en segundo plano
        run: |
          yarn start &
          npx wait-on http://localhost:3000 --timeout 60000

      - name: Configurar Python (suite Selenium)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias de pruebas
        working-directory: proyecto_pruebas_e2e
        run: pip install -r requirements.txt

      - name: Ejecutar pruebas E2E con cobertura
        working-directory: proyecto_pruebas_e2e
        run: |
          pytest tests/ -v --cov=../server/utils --cov-report=xml \
                 --html=reports/report.html --self-contained-html

      - name: Subir reporte de pruebas como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: reporte-pruebas
          path: proyecto_pruebas_e2e/reports/report.html

      - name: Analisis estatico con SonarQube
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
