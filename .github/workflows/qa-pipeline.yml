name: QA Pipeline - Selenium + SonarCloud

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: development
      DATABASE_URL: postgres://user:pass@localhost:5432/outline
      REDIS_URL: redis://127.0.0.1:6379
      URL: http://localhost:3000
      SECRET_KEY: F0E5AD933D7F6FD8F4DBB3E038C501C052DC0593C686D21ACB30AE205D2F634B
      UTILS_SECRET: 123456
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js (versión compatible)
        uses: actions/setup-node@v4
        with:
          node-version: '22'   # dentro del rango permitido por engines

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias de pruebas Python
        run: pip install selenium pytest pytest-cov pytest-html webdriver-manager

      - name: Levantar Redis y Postgres
        run: docker compose up -d

      - name: Instalar dependencias de Outline
        run: yarn install --frozen-lockfile

      - name: Compilar Outline
        run: yarn build

      - name: Iniciar Outline en segundo plano
        run: yarn start &

      - name: Esperar a que el servicio responda
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000 && break
            sleep 5
          done

      - name: Ejecutar pruebas E2E con cobertura
        run: |
          pytest tests/ -v \
            --cov=src --cov-report=xml \
            --html=reports/report.html --self-contained-html

      - name: Subir reporte y cobertura como artefactos
        uses: actions/upload-artifact@v4
        with:
          name: reportes-qa
          path: |
            reports/report.html
            coverage.xml

  sonarcloud-scan:
    needs: e2e-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # SonarCloud necesita el historial completo para el análisis de código nuevo

      - name: Descargar artefactos de cobertura
        uses: actions/download-artifact@v4
        with:
          name: reportes-qa

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}